name: Bug 报告
description: 报告可复现的错误或异常行为
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。提交前请先搜索现有 Issue，并确保内容中不包含密码、Token、Cookie、联系方式或其他敏感信息。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清楚说明实际发生了什么，以及你期望的行为。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 点击...
        3. 看到...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 包括操作系统、浏览器、Node/Go/Docker 版本以及使用的提交或分支。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可选。请先移除所有凭据、个人信息和敏感业务数据。
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
        - label: 我已确认内容中不包含敏感信息。
          required: true
