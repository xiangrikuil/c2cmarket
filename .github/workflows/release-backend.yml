name: publish-backend

on:
  workflow_call:
    inputs:
      release_tag:
        description: Readable GHCR alias for the environment
        required: true
        type: string
      git_sha:
        description: Exact tested Git commit to build and deploy
        required: true
        type: string

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/xiangrikuil/c2cmarket-backend

jobs:
  publish:
    name: publish backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.git_sha }}
            ${{ env.IMAGE_NAME }}:${{ inputs.release_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ inputs.git_sha }}
          cache-from: type=gha,scope=backend-${{ inputs.release_tag }}
          cache-to: type=gha,mode=max,scope=backend-${{ inputs.release_tag }}
