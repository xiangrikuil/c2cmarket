name: ci

on:
  pull_request:
  push:
    branches: [staging, main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11
      - run: go test ./...
        working-directory: backend
      - run: node scripts/check-openapi-routes.mjs
      - run: node scripts/check-migrations-doc.mjs
      - run: bash scripts/test-vps-release.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm typecheck
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
        env:
          VITE_API_MODE: real
      - run: pnpm test
        working-directory: frontend

  release-staging:
    name: release staging backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: [backend, frontend]
    uses: ./.github/workflows/release-backend.yml
    with:
      deploy_environment: staging
      release_tag: staging
      git_sha: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    concurrency:
      group: backend-release-staging
      cancel-in-progress: false

  release-production:
    name: release production backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    uses: ./.github/workflows/release-backend.yml
    with:
      deploy_environment: production
      release_tag: production
      git_sha: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    concurrency:
      group: backend-release-production
      cancel-in-progress: false
