name: ci

on:
  pull_request:
  push:
    branches: [staging, main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11
      - run: go test ./...
        working-directory: backend
      - run: node scripts/check-openapi-routes.mjs
      - run: node scripts/check-migrations-doc.mjs
      - run: bash scripts/test-vps-release.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm typecheck
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_MODE: real
          NUXT_PUBLIC_SITE_URL: https://c2cmarket.shop
          NUXT_PUBLIC_API_BASE_URL: https://api.c2cmarket.shop
          NUXT_API_BASE_URL: https://api.c2cmarket.shop
      - run: pnpm test
        working-directory: frontend

  publish-staging:
    name: publish staging backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: [backend, frontend]
    uses: ./.github/workflows/release-backend.yml
    with:
      release_tag: staging
      git_sha: ${{ github.sha }}
    permissions:
      contents: read
      packages: write

  deploy-staging:
    name: deploy staging backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: publish-staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: staging
    concurrency:
      group: backend-release-staging
      cancel-in-progress: false
    env:
      DEPLOY_ENVIRONMENT: staging
      GIT_SHA: ${{ github.sha }}
      IMAGE_REF: ghcr.io/xiangrikuil/c2cmarket-backend:${{ github.sha }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
    steps: &deploy-backend-steps
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Create release archive
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          archive_name="c2cmarket-release-${DEPLOY_ENVIRONMENT}-${GIT_SHA}.tar.gz"
          archive_path="${RUNNER_TEMP}/${archive_name}"
          tar -czf "${archive_path}" \
            compose.yaml \
            compose.prod.yaml \
            backend/migrations \
            scripts/backup-production-postgres.sh \
            scripts/deploy-vps-backend.sh \
            scripts/install-vps-release.sh
          echo "name=${archive_name}" >>"${GITHUB_OUTPUT}"
          echo "path=${archive_path}" >>"${GITHUB_OUTPUT}"

      - name: Configure deployment SSH identity
        shell: bash
        run: |
          set -euo pipefail
          test -n "${VPS_HOST}"
          test -n "${VPS_USER}"
          test -n "${VPS_SSH_PRIVATE_KEY}"
          test -n "${VPS_SSH_KNOWN_HOSTS}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" >"${HOME}/.ssh/c2cmarket_deploy"
          printf '%s\n' "${VPS_SSH_KNOWN_HOSTS}" >"${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/c2cmarket_deploy" "${HOME}/.ssh/known_hosts"

      - name: Upload release archive
        shell: bash
        env:
          ARCHIVE_NAME: ${{ steps.archive.outputs.name }}
          ARCHIVE_PATH: ${{ steps.archive.outputs.path }}
        run: |
          set -euo pipefail
          scp \
            -i "${HOME}/.ssh/c2cmarket_deploy" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${ARCHIVE_PATH}" \
            "${VPS_USER}@${VPS_HOST}:/tmp/${ARCHIVE_NAME}"

      - name: Install and deploy release
        shell: bash
        env:
          ARCHIVE_NAME: ${{ steps.archive.outputs.name }}
        run: |
          set -euo pipefail
          ssh \
            -i "${HOME}/.ssh/c2cmarket_deploy" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            /bin/bash -s -- \
            "${DEPLOY_ENVIRONMENT}" \
            "${GIT_SHA}" \
            "${IMAGE_REF}" \
            "/tmp/${ARCHIVE_NAME}" \
            <scripts/install-vps-release.sh

  publish-production:
    name: publish production backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    uses: ./.github/workflows/release-backend.yml
    with:
      release_tag: production
      git_sha: ${{ github.sha }}
    permissions:
      contents: read
      packages: write

  deploy-production:
    name: deploy production backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish-production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    concurrency:
      group: backend-release-production
      cancel-in-progress: false
    env:
      DEPLOY_ENVIRONMENT: production
      GIT_SHA: ${{ github.sha }}
      IMAGE_REF: ghcr.io/xiangrikuil/c2cmarket-backend:${{ github.sha }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
    steps: *deploy-backend-steps
