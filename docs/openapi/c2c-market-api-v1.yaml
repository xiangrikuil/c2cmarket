openapi: 3.1.0
info:
  title: C2CMarket API
  version: 0.1.0
  summary: Backend contract foundation and official price lead slice.
  description: |
    This contract covers the first executable backend slice. C2CMarket is a price intelligence
    and community matching platform. It does not process payments, escrow funds, store third-party
    credentials, store plaintext native passwords, auto-deliver keys/accounts, or proxy upstream API
    traffic. Native C2CMarket account passwords are stored only as salted hashes.
servers:
  - url: http://localhost:8080
security:
  - sessionCookie: []
paths:
  /health:
    get:
      operationId: getHealth
      tags: [System]
      security: []
      responses:
        "200":
          description: Service health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /readyz:
    get:
      operationId: getReadiness
      tags: [System]
      security: []
      summary: Check process and configured database readiness.
      responses:
        "200":
          description: Ready, or no database configured for the local in-memory slice.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Database or migration readiness failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /api/v1/auth/dev-session:
    post:
      x-dev-only: true
      operationId: createDevSession
      tags: [DevAuth]
      security: []
      summary: Create a local development session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                username:
                  type: string
                  maxLength: 64
                admin:
                  type: boolean
      responses:
        "200":
          description: Development session.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/session:
    get:
      operationId: getSession
      tags: [Auth]
      responses:
        "200":
          description: Current session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Problem"
  /api/v1/auth/password/login:
    post:
      operationId: loginWithPassword
      tags: [Auth]
      security: []
      summary: Log in with a native C2CMarket username and password.
      description: |
        Creates the same cookie-backed session as OAuth login. Password credentials are stored as salted hashes and are intended to support native website accounts alongside linux.do OAuth.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordLoginRequest"
      responses:
        "200":
          description: Authenticated session.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/password:
    post:
      operationId: setBackupPassword
      tags: [Auth]
      summary: Set or change the current user's backup password.
      description: |
        Requires the cookie session and CSRF token. Accounts created through linux.do OAuth can set a backup password without a current password; accounts with an existing backup password must provide the current password. Plaintext passwords are never stored or returned.
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPasswordRequest"
      responses:
        "204":
          description: Backup password configured.
        "401":
          $ref: "#/components/responses/Problem"
        "403":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/email-registration/start:
    post:
      operationId: startEmailRegistration
      tags: [Auth]
      security: []
      summary: Disabled native email registration entry.
      description: |
        First release only supports linux.do OAuth registration and login. This route is retained as a stable compatibility boundary and always returns `EMAIL_REGISTRATION_DISABLED`; it does not send email, create a challenge, account, or session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartEmailVerificationRequest"
      responses:
        "403":
          description: Email registration disabled. Problem `code` is `EMAIL_REGISTRATION_DISABLED`.
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/email-registration/confirm:
    post:
      operationId: confirmEmailRegistration
      tags: [Auth]
      security: []
      summary: Disabled native email registration confirmation.
      description: |
        First release only supports linux.do OAuth registration and login. This route is retained as a stable compatibility boundary and always returns `EMAIL_REGISTRATION_DISABLED`; it never creates a native email account or session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmEmailVerificationRequest"
      responses:
        "403":
          description: Email registration disabled. Problem `code` is `EMAIL_REGISTRATION_DISABLED`.
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/oauth/start:
    get:
      operationId: startOAuthLogin
      tags: [Auth]
      security: []
      summary: Start OAuth login.
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
            maxLength: 256
      responses:
        "200":
          description: OAuth authorization URL.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthStartResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/oauth/callback:
    get:
      operationId: completeOAuthLogin
      tags: [Auth]
      security: []
      summary: Complete OAuth login callback.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Session cookie set and browser redirected to the original return path.
          headers:
            Set-Cookie:
              schema:
                type: string
            Location:
              schema:
                type: string
        "403":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/auth/logout:
    post:
      operationId: logoutSession
      tags: [Auth]
      security:
        - sessionCookie: []
          csrfToken: []
      responses:
        "204":
          description: Logged out.
        "403":
          $ref: "#/components/responses/Problem"
  /api/v1/search:
    get:
      operationId: searchMarket
      tags: [Search]
      security: []
      summary: Search public market resources.
      description: Aggregates only public-safe official price records, active carpools, active demands, public API services, public users, and public-profile merchants. It does not expose contact values, credentials, hidden store-alias owner mappings, payment, escrow, guarantee, or fulfillment data.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: paymentMethod
          in: query
          required: false
          description: Optional payment-method filter. Public lists return only currently orderable API services.
          schema:
            type: string
            enum: [wechat, alipay]
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
      responses:
        "200":
          description: Public search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResultList"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/me/profile:
    get:
      operationId: getMyProfile
      tags: [Profiles]
      responses:
        "200":
          description: Current user's editable profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfile"
    patch:
      operationId: updateMyProfile
      tags: [Profiles]
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileRequest"
      responses:
        "200":
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfile"
  /api/v1/me/email-verification/start:
    post:
      operationId: startEmailVerification
      tags: [Profiles]
      summary: Start email binding verification for the current user.
      description: |
        Sends a one-time verification code through the configured email sender. Development and test environments may expose `devCode` for local automation; production must use a provider and must not log or return plaintext credentials.
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartEmailVerificationRequest"
      responses:
        "200":
          description: Verification challenge created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartEmailVerificationResponse"
        "403":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/me/email-verification/confirm:
    post:
      operationId: confirmEmailVerification
      tags: [Profiles]
      summary: Confirm an email verification code and bind the email.
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmEmailVerificationRequest"
      responses:
        "200":
          description: Updated profile with verified email state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfile"
        "403":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/me/contact-methods:
    get:
      operationId: listMyContactMethods
      tags: [ContactMethods]
      responses:
        "200":
          description: Current user's contact methods with masked values only.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMethodList"
  /api/v1/me/merchant-profile:
    get:
      operationId: getMyMerchantProfile
      tags: [Profiles]
      responses:
        "200":
          description: Current user's merchant profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantProfile"
        "404":
          $ref: "#/components/responses/Problem"
    post:
      operationId: createMyMerchantProfile
      tags: [Profiles]
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantProfileRequest"
      responses:
        "200":
          description: Upserted merchant profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantProfile"
    patch:
      operationId: updateMyMerchantProfile
      tags: [Profiles]
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantProfileRequest"
      responses:
        "200":
          description: Updated merchant profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantProfile"
  /api/v1/users/{username}/public-profile:
    get:
      operationId: getPublicUserProfile
      tags: [Profiles]
      security: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public user profile without contact values or hidden owner mappings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUserProfileBundle"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/users/{username}/reviews:
    get:
      operationId: listPublicUserReviews
      tags: [Reviews]
      security: []
      summary: List verified public reviews for a user.
      description: Returns reviews written by buyers after completed carpool memberships. API purchase intents are not included because they have no platform-confirmed completion state.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verified public reviews.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicReviewList"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/users/{username}/disputes:
    get:
      operationId: listPublicUserDisputes
      tags: [Reports]
      security: []
      summary: List public-safe dispute summaries for a user.
      description: Returns only sanitized dispute type/result fields. It never exposes reporter IDs, admin IDs, contact values, internal notes, evidence text, payment/refund decisions, or credential material.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public dispute summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicDisputeList"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/merchant-profiles/{slug}:
    get:
      operationId: getPublicMerchantProfile
      tags: [Profiles]
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public merchant profile without owner user id or contact values.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicMerchantProfileBundle"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/announcements:
    get:
      operationId: listAnnouncements
      tags: [Announcements]
      responses:
        "200":
          description: User-visible platform announcements with current user's receipt state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementList"
  /api/v1/announcements/active:
    get:
      operationId: listActiveAnnouncements
      tags: [Announcements]
      parameters:
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [message_center, home_banner]
      responses:
        "200":
          description: Active published announcements, optionally filtered by channel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementList"
  /api/v1/announcements/home:
    get:
      operationId: getHomeAnnouncement
      tags: [Announcements]
      responses:
        "200":
          description: Highest-priority home banner announcement for the current user, or null.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/Announcement"
                  - type: "null"
  /api/v1/announcements/{slug}:
    get:
      operationId: getAnnouncementDetail
      tags: [Announcements]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User-visible announcement detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/product-categories:
    get:
      operationId: listProductCategories
      tags: [ProductCatalog]
      security: []
      summary: List active product categories.
      responses:
        "200":
          description: Active product categories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategoryList"
  /api/v1/product-plans:
    get:
      operationId: listProductPlans
      tags: [ProductCatalog]
      security: []
      summary: List active product plans.
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Optional product category code such as gpt, claude, cursor, gemini, perplexity, or other.
      responses:
        "200":
          description: Active product plans.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPlanList"
  /api/v1/product-plans/{id}:
    get:
      operationId: getProductPlan
      tags: [ProductCatalog]
      security: []
      summary: Get one active product plan.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Product plan detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPlan"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/api-models:
    get:
      operationId: listAPIModels
      tags: [APIMarket]
      security: []
      summary: List active API model catalog entries.
      responses:
        "200":
          description: Active API models.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIModelList"
  /api/v1/api-models/{id}:
    get:
      operationId: getAPIModel
      tags: [APIMarket]
      security: []
      summary: Get one active API model catalog entry.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: API model detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIModel"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/api-services:
    get:
      operationId: listPublicAPIServices
      tags: [APIMarket]
      security: []
      summary: List orderable public API services.
      description: Returns API services that are approved, online, clear, accepting orders, have a valid 3-15 minute payment window, and have at least one enabled payment option. Public service reads do not process payment, proxy upstream calls, expose payment QR codes, or store/deliver credentials.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Public API services.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAPIServiceList"
  /api/v1/api-services/{id}:
    get:
      operationId: getPublicAPIService
      tags: [APIMarket]
      security: []
      summary: Get one orderable public API service.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Orderable public API service detail.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAPIService"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/api-services/{id}/purchase-intents:
    post:
      operationId: createAPIPurchaseIntent
      tags: [APIPurchaseIntents]
      security:
        - sessionCookie: []
          csrfToken: []
      summary: Submit an API service purchase intent and view the merchant contact.
      description: |
        Creates a non-payment purchase intent for off-platform confirmation. Only an orderable API service can receive new intents: approved, online, clear, accepting orders, valid payment window, and at least one enabled payment option. The owner has pre-consented to receive compliant intents and disclose the selected merchant contact to the successful buyer. The disclosure writes an API purchase intent contact access audit log with request ID and side metadata, without storing plaintext contact values. Purchase-intent creation does not store credentials, deliver keys, or proxy API traffic.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIPurchaseIntentRequest"
      responses:
        "201":
          description: Purchase intent created. The response includes the frozen merchant contact and must be served with Cache-Control private, no-store.
          headers:
            Cache-Control:
              schema:
                type: string
              description: Always `private, no-store` because this response contains a full contact value.
            Location:
              schema:
                type: string
              description: Buyer detail URL for the created purchase intent.
            ETag:
              schema:
                type: string
              description: Version ETag for follow-up versioned actions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIPurchaseIntentResponse"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/official-prices:
    get:
      operationId: listOfficialPrices
      tags: [OfficialPrices]
      security: []
      summary: List active official price records.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Active official price records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficialPriceRecordList"
  /api/v1/official-prices/{id}:
    get:
      operationId: getOfficialPrice
      tags: [OfficialPrices]
      security: []
      summary: Get one active official price record.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Official price record detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficialPriceRecord"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/demands:
    get:
      operationId: listDemands
      tags: [Demands]
      security: []
      summary: List active demand posts.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Active public demand posts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemandList"
    post:
      operationId: createDemand
      tags: [Demands]
      security:
        - sessionCookie: []
          csrfToken: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDemandRequest"
      responses:
        "201":
          description: Demand submitted for admin review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Demand"
        "400":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /api/v1/demands/{id}:
    get:
      operationId: getDemand
      tags: [Demands]
      security: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Active demand detail.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Demand"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/carpools:
    get:
      operationId: listCarpools
      tags: [Carpools]
      security: []
      summary: List active carpool listings.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Active carpool listings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarpoolListingList"
    post:
      operationId: createCarpool
      tags: [Carpools]
      security:
        - sessionCookie: []
          csrfToken: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarpoolListingRequest"
      responses:
        "201":
          description: Draft listing created. A linux.do-bound owner can publish it through the retained submit-review compatibility route.
          headers:
            ETag:
              schema:
                type: string
