        - sessionCookie: []
          csrfToken: []
      summary: Create an API service order from an existing purchase intent.
      description: Creates one explicit API order for the purchase intent. The request only selects a payment method; amount, currency, service title, counterparties, payment window, private payment instructions, and payment QR snapshot are frozen server-side. The platform does not process payment, escrow funds, or proxy API traffic. A seller may later submit one buyer-specific delivery credential after payment is confirmed. A purchase intent can create at most one API order; duplicate or concurrent order creation returns `409 API_PURCHASE_INTENT_HAS_ORDER`.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIOrderRequest"
      responses:
        "201":
          description: API order created. Payment instructions are not included in this response.
          headers:
            Cache-Control:
              schema:
                type: string
              description: Always `private, no-store`.
            Location:
              schema:
                type: string
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIOrder"
        "409":
          description: Conflict. Duplicate order creation for the same purchase intent returns Problem `code` `API_PURCHASE_INTENT_HAS_ORDER`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          $ref: "#/components/responses/Problem"
