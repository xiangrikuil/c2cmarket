components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: c2c_session
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        pattern: '^"?[1-9][0-9]*"?$'
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      description: Page size. Defaults to 20 and must be between 1 and 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor returned as nextCursor. Clients must pass it back unchanged and must not inspect its internal encoding.
      schema:
        type: string
    FavoriteTargetType:
      name: targetType
      in: path
      required: true
      schema:
        type: string
        enum: [carpool, api_service, api-service]
    FavoriteTargetId:
      name: targetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Problem:
      description: Problem Details error.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    RateLimited:
      description: Rate limit exceeded. Problem Details `code` is `RATE_LIMITED`.
      headers:
        Retry-After:
          schema:
            type: string
          description: Seconds until the current in-process rate-limit window resets when known.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
  schemas:
    DecimalString:
      type: string
      pattern: '^[0-9]+(\.[0-9]{1,8})?$'
      maxLength: 32
    CountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          minimum: 0
    SearchResult:
      type: object
      required: [id, type, title, subtitle, badge, to]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [官方价格, 车源, 求车, API 服务, 用户, 商户]
        title:
          type: string
        subtitle:
          type: string
          description: Public-safe summary. Must not contain contact values, hidden store-alias owner usernames, credentials, payment, escrow, guarantee, or fulfillment material.
        badge:
          type: string
        to:
          type: string
    SearchResultList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        nextCursor:
          type: [string, "null"]
    Notification:
      type: object
      required: [id, type, title, detail, targetType, targetId, to, unread, createdAt, time]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: Business inbox category label. This is station-inbox metadata, not an external push channel.
        title:
          type: string
        detail:
          type: string
          description: Public-safe detail text. Must not contain contact values, credentials, tokens, sessions, cookies, or credential delivery material.
        targetType:
          type: string
        targetId:
          type: string
        to:
          type: string
        unread:
          type: boolean
        readAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        time:
          type: string
          format: date-time
    NotificationList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        nextCursor:
          type: [string, "null"]
    NotificationReadAllResult:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
    NavigationBadgeRoleSummary:
      type: object
      required: [carpoolActions, apiOrderActions]
      properties:
        carpoolActions:
          type: integer
          minimum: 0
        apiOrderActions:
          type: integer
          minimum: 0
    NavigationBadgeAdminSummary:
      type: object
      required: [total, officialPrices, carpools, apiServices, feedbackTickets, reports]
      properties:
        total:
          type: integer
          minimum: 0
        officialPrices:
          type: integer
          minimum: 0
        carpools:
          type: integer
          minimum: 0
        apiServices:
          type: integer
          minimum: 0
        feedbackTickets:
          type: integer
          minimum: 0
        reports:
          type: integer
          minimum: 0
    NavigationBadgeSummary:
      type: object
      required: [generatedAt, notificationUnread, importantAnnouncementUnread, feedbackUnread, buyer, merchant, admin]
      properties:
        generatedAt:
          type: string
          format: date-time
        notificationUnread:
          type: integer
          minimum: 0
        importantAnnouncementUnread:
          type: integer
          minimum: 0
        feedbackUnread:
          type: integer
          minimum: 0
        buyer:
          $ref: "#/components/schemas/NavigationBadgeRoleSummary"
        merchant:
          $ref: "#/components/schemas/NavigationBadgeRoleSummary"
        admin:
          oneOf:
            - $ref: "#/components/schemas/NavigationBadgeAdminSummary"
            - type: "null"
    AnnouncementAudience:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [all]
    AnnouncementReceipt:
      type: object
      required: [announcementId, announcementVersion]
      properties:
        announcementId:
          type: string
          format: uuid
        announcementVersion:
          type: integer
        firstSeenAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
        dismissedAt:
          type: string
          format: date-time
    Announcement:
      type: object
      required:
        - id
        - slug
        - title
        - summary
        - contentMarkdown
        - category
        - level
        - status
        - channels
        - audience
        - isPinned
        - isDismissible
        - publishAt
        - version
        - createdBy
        - updatedBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        contentMarkdown:
          type: string
          description: Non-sensitive Markdown content. Must not contain passwords, API keys, tokens, sessions, cookies, or credential delivery material.
        category:
          type: string
          enum: [platform, rules, maintenance, feature, risk, operation]
        level:
          type: string
          enum: [normal, important]
        status:
          type: string
          enum: [draft, scheduled, published, offline, expired, archived]
        channels:
          type: array
          items:
            type: string
            enum: [message_center, home_banner]
        audience:
          $ref: "#/components/schemas/AnnouncementAudience"
        isPinned:
          type: boolean
        isDismissible:
          type: boolean
        ctaLabel:
          type: string
        ctaUrl:
          type: string
        publishAt:
          type: string
          format: date-time
        expireAt:
          type: string
          format: date-time
        version:
          type: integer
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        receipt:
          $ref: "#/components/schemas/AnnouncementReceipt"
    AnnouncementList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        nextCursor:
          type: [string, "null"]
    AnnouncementFormRequest:
      type: object
      additionalProperties: false
      required: [title, summary, contentMarkdown, category, level, channels, isPinned, isDismissible, publishAt]
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 80
        summary:
          type: string
          minLength: 10
          maxLength: 160
        contentMarkdown:
          type: string
          minLength: 10
        category:
          type: string
          enum: [platform, rules, maintenance, feature, risk, operation]
        level:
          type: string
          enum: [normal, important]
        channels:
          type: array
          items:
            type: string
            enum: [message_center, home_banner]
        isPinned:
          type: boolean
        isDismissible:
          type: boolean
        ctaLabel:
          type: string
        ctaUrl:
          type: string
        publishAt:
          type: string
          format: date-time
        expireAt:
          type: string
          format: date-time
    AnnouncementOfflineRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
    AnnouncementAuditLog:
      type: object
      required: [id, action, announcementId, announcementTitle, operatorId, operatorName, createdAt]
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          enum: [announcement_created, announcement_updated, announcement_published, announcement_offlined, announcement_duplicated]
        announcementId:
          type: string
          format: uuid
        announcementTitle:
          type: string
        operatorId:
          type: string
        operatorName:
          type: string
        reason:
          type: string
        createdAt:
          type: string
          format: date-time
    AnnouncementAuditLogList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncementAuditLog"
        nextCursor:
          type: [string, "null"]
    PrivacySettings:
      type: object
      required: [showCreatedAt, showLastActiveAt, showCompletedCarpoolCount, showCompletedApiIntentCount, showResponseMedian, showResolvedDisputeSummary, allowPublicProfileReport]
      properties:
        showCreatedAt:
          type: boolean
        showLastActiveAt:
          type: boolean
        showCompletedCarpoolCount:
          type: boolean
        showCompletedApiIntentCount:
          type: boolean
        showResponseMedian:
          type: boolean
        showResolvedDisputeSummary:
          type: boolean
        allowPublicProfileReport:
          type: boolean
    UpdateMyProfileRequest:
      type: object
      additionalProperties: false
      required: [displayName, username, bio, regionCode, timezone, avatarMode, privacy]
      properties:
        displayName:
          type: string
        username:
          type: string
        bio:
          type: [string, "null"]
        regionCode:
          type: [string, "null"]
        timezone:
          type: [string, "null"]
        avatarMode:
          type: string
          enum: [linuxdo, custom_url]
        avatarUrl:
          type: string
          description: Required when `avatarMode` is `custom_url`; must be an HTTPS image URL.
        privacy:
          $ref: "#/components/schemas/PrivacySettings"
    StartEmailVerificationRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
    StartEmailVerificationResponse:
      type: object
      required: [email, expiresAt]
      properties:
        email:
          type: string
          format: email
        expiresAt:
          type: string
          format: date-time
        devCode:
          type: string
          description: Present only in development/test local automation responses.
    ConfirmEmailVerificationRequest:
      type: object
      additionalProperties: false
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        code:
          type: string
          pattern: '^[0-9]{6}$'
    MyProfile:
      type: object
      required: [id, username, displayName, emailVerified, passwordConfigured, avatarMode, accountStatus, permissions, linuxDoBinding, badges, restrictions, usernameChangePolicy, privacy, createdAt, updatedAt, version]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        bio:
          type: [string, "null"]
        avatarUrl:
          type: [string, "null"]
        customAvatarUrl:
          type: [string, "null"]
        email:
          type: [string, "null"]
          format: email
        emailVerified:
          type: boolean
        emailVerifiedAt:
          type: [string, "null"]
          format: date-time
