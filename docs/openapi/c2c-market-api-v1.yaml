          $ref: "#/components/schemas/CarpoolCycleTermInput"
        title:
          type: string
          maxLength: 120
        summary:
          type: string
          maxLength: 2000
        accessArrangement:
          type: string
          description: Non-sensitive member/seat/off-platform access arrangement. Must not contain passwords, keys, tokens, sessions, cookies, or panel owner credentials.
          maxLength: 2000
        distributionMethod:
          type: string
          enum: [sub2api, other]
          description: Public listing distribution method. Describes whether the owner supports Sub2API-managed use or another off-platform arrangement.
        distributionMethodNote:
          type: string
          description: Public non-sensitive distribution note. Required when distributionMethod is other. Must not contain account credentials, panel URLs, passwords, keys, tokens, sessions, cookies, or owner credentials.
          maxLength: 500
        providesAdminAccount:
          type: boolean
          description: Whether the listing owner declares that administrator account access is provided. This is a public signal only and does not store credentials.
        regionCode:
          type: string
          description: Stable opening-region code selected by the owner. Custom region listings use `other`.
          maxLength: 64
        regionName:
          type: string
          description: Public opening-region display name. For custom regions this is the owner-provided region text.
          maxLength: 64
        sourceUrl:
          type: string
          format: uri
        priceMonthlyCny:
          $ref: "#/components/schemas/DecimalString"
        serviceMultiplier:
          $ref: "#/components/schemas/DecimalString"
          description: Owner-declared usage multiplier, for example 1.3 means billed or compared at 1.3x.
        monthlyQuotaAmount:
          $ref: "#/components/schemas/DecimalString"
          description: Owner-declared per-seat monthly quota amount. Label, unit, and period come from the selected product plan and are not accepted from the client.
        buyerSeatCapacity:
          type: integer
          minimum: 1
          description: Buyer seats only. Excludes the listing owner.
        activeBuyerMembers:
          type: integer
          minimum: 0
          description: Active buyer members only. Excludes the listing owner.
        riskAcknowledgement:
          $ref: "#/components/schemas/RiskAcknowledgement"
