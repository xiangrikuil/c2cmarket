services:
  postgres:
    restart: always
    ports: !reset []

  backend:
    profiles:
      - app
    restart: always
    environment:
      APP_ENV: production
      ENABLE_DEV_AUTH: "false"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      TRUST_X_FORWARDED_FOR: ${TRUST_X_FORWARDED_FOR:-false}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      OAUTH_PROVIDER_MODE: oauth2
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:?OAUTH_CLIENT_ID is required}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:?OAUTH_CLIENT_SECRET is required}
      OAUTH_AUTHORIZE_URL: ${OAUTH_AUTHORIZE_URL:?OAUTH_AUTHORIZE_URL is required}
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL:?OAUTH_TOKEN_URL is required}
      OAUTH_USERINFO_URL: ${OAUTH_USERINFO_URL:?OAUTH_USERINFO_URL is required}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:?OAUTH_REDIRECT_URL is required}
      OAUTH_SCOPES: ${OAUTH_SCOPES:-openid profile}
      CONTACT_ENCRYPTION_KEY: ${CONTACT_ENCRYPTION_KEY:?CONTACT_ENCRYPTION_KEY is required}
      CONTACT_FINGERPRINT_KEY: ${CONTACT_FINGERPRINT_KEY:?CONTACT_FINGERPRINT_KEY is required}
      CONTACT_KEY_VERSION: ${CONTACT_KEY_VERSION:?CONTACT_KEY_VERSION is required}
      C2C_BOOTSTRAP_ADMIN_USERNAME: ${C2C_BOOTSTRAP_ADMIN_USERNAME:-}
      C2C_BOOTSTRAP_ADMIN_PASSWORD: ${C2C_BOOTSTRAP_ADMIN_PASSWORD:-}
      EMAIL_PROVIDER: aliyun_directmail
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:?SMTP_USERNAME is required}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD is required}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:?MAIL_FROM_ADDRESS is required}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-C2CMarket}
